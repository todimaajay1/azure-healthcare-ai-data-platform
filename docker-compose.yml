version: '3.8'

services:
  postgres-metadata:
    image: postgres:15-alpine
    container_name: data-lakehouse-metadata-db
    environment:
      POSTGRES_USER: lakehouse_user
      POSTGRES_PASSWORD: lakehouse_password
      POSTGRES_DB: metadata_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_metadata_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lakehouse_user -d metadata_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse-network
    restart: unless-stopped

volumes:
  postgres_metadata_data:
    driver: local

networks:
  lakehouse-network:
    driver: bridge
